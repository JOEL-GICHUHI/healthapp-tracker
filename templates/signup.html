<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare Plus | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --turquoise: #00A89E;
            --turquoise-dark: #008f86;
            --white: #ffffff;
            --text-main: #333333;
            --text-muted: #777777;
            --error-red: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #00A89E 0%, #007d75 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .hidden { display: none; }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 50px;
            color: var(--turquoise);
        }

        .header h1 {
            color: var(--turquoise);
            font-size: 24px;
        }

        .form-group { margin-bottom: 15px; }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group { flex: 1; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--turquoise); }

        .gender-group {
            display: flex;
            gap: 15px;
        }

        .gender-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .gender-option input { display: none; }

        .gender-option.selected {
            border-color: var(--turquoise);
            background: #e6f7f6;
            font-weight: 600;
            color: var(--turquoise-dark);
        }

        .error-message {
            color: var(--error-red);
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--turquoise);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--turquoise-dark);
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--turquoise);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<!-- SIGN UP -->
<div id="signup-view" class="auth-card">
    <div class="header">
        <div class="logo-icon">✚</div>
        <h1>Create Account</h1>
        <p>Join HealthCare Plus today.</p>
    </div>

    <form id="signUpForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="name@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="+1 1234567890" pattern="^\+.*" title="Please include country code starting with +" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="reg-dob" required>
                <div id="dobError" class="error-message">Date cannot be in the future.</div>
            </div>
            <div class="form-group">
                <label>Insurance ID (Optional)</label>
                <input type="text" placeholder="ID Number">
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="gender-group">
                <label class="gender-option" id="maleOption">
                    <input type="radio" name="gender" value="male" required>
                    Male
                </label>
                <label class="gender-option" id="femaleOption">
                    <input type="radio" name="gender" value="female" required>
                    Female
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-pass" placeholder="At least 8 characters" required>
        </div>

        <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <div class="footer-link">
        Already have an account? <a onclick="toggleView('login-view')">Log In</a>
    </div>
</div>

<!-- LOGIN -->
<div id="login-view" class="auth-card hidden">
    <div class="header">
        <div class="logo-icon">✚</div>
        <h1>Welcome Back</h1>
        <p>Please log in to your account.</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="name@email.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-submit">Log In</button>
    </form>

    <div class="footer-link">
        Don't have an account? <a onclick="toggleView('signup-view')">Sign Up</a>
    </div>
</div>

<script>
function toggleView(viewId) {
    document.getElementById('signup-view').classList.add('hidden');
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById(viewId).classList.remove('hidden');
}

const dobInput = document.getElementById('reg-dob');
const dobError = document.getElementById('dobError');

function setMaxDOB() {
    const today = new Date();
    today.setHours(0,0,0,0);
    dobInput.max = today.toISOString().split('T')[0];
}
setMaxDOB();

dobInput.addEventListener("input", function() {
    const selected = new Date(dobInput.value);
    const today = new Date();
    today.setHours(0,0,0,0);
    selected.setHours(0,0,0,0);
    dobError.style.display = selected > today ? "block" : "none";
});

document.querySelectorAll('.gender-option').forEach(option => {
    option.addEventListener('click', function() {
        document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        this.querySelector('input').checked = true;
    });
});

document.getElementById('signUpForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const password = document.getElementById('reg-pass').value;
    if (password.length < 8) {
        alert("Password must be at least 8 characters.");
        return;
    }

    alert("Registration Successful!");
    this.reset();
    document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('selected'));
    toggleView('login-view');
});

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    alert("Login successful!");
});
</script>

</body>
</html>
