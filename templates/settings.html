<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#f0fafa;min-height:100vh}
    .topbar{background:white;padding:20px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #d0ecea}
    .topbar a{color:#1ABCB0;text-decoration:none;font-size:1.4rem}
    .topbar h1{color:#1e3a3a;font-size:1.2rem;font-weight:600}
    .content{padding:20px 16px;max-width:480px;margin:0 auto}
    .section{background:white;border-radius:16px;border:1px solid #d0ecea;overflow:hidden;margin-bottom:16px}
    .item{display:flex;align-items:center;gap:14px;padding:16px 18px;text-decoration:none;color:#1e3a3a;font-size:0.95rem;border-bottom:1px solid #d0ecea}
    .item:last-child{border-bottom:none}
    .item:hover{background:#e0f7f5}
    .item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
    .arrow{margin-left:auto;color:#a8e8e3;font-size:1.1rem}
    .logout-section{background:white;border-radius:16px;border:1px solid #fde8e8;overflow:hidden}
    .logout{display:flex;align-items:center;gap:14px;padding:16px 18px;text-decoration:none;color:#e05c5c;font-size:0.95rem;font-weight:600}
    .logout:hover{background:#fff0f0}
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/dashboard">&#8592;</a>
    <h1>Settings</h1>
  </div>
  <div class="content">
    <div class="section">
      <a href="/profile" class="item">
        <div class="item-icon" style="background:#e0f7f5">👤</div>
        Account
        <span class="arrow">›</span>
      </a>
      <a href="/settings/notifications" class="item">
        <div class="item-icon" style="background:#ede8fd">🔔</div>
        Notifications
        <span class="arrow">›</span>
      </a>
      <a href="/privacy" class="item">
        <div class="item-icon" style="background:#fdf0e0">🛡️</div>
        Data &amp; Privacy
        <span class="arrow">›</span>
      </a>
      <a href="/settings/language" class="item">
        <div class="item-icon" style="background:#e8f0fe">🌐</div>
        Language &amp; Inputs
        <span class="arrow">›</span>
      </a>
      <a href="/settings/theme" class="item">
        <div class="item-icon" style="background:#fde8f0">🎨</div>
        Theme
        <span class="arrow">›</span>
      </a>
    </div>
    <div class="logout-section">
      <a href="/logout" class="logout">
        🚪 Log out
      </a>
    </div>
  </div>
</body>
</html>
