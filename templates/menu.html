<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu – HealthCare</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#1ABCB0;--teal-dark:#138a81;--teal-light:#e0f7f5;--bg:#f0fafa;--card:#fff;--text:#1e3a3a;--muted:#7da8a8;--border:#d0ecea;}
    body{min-height:100vh;background:var(--teal-light);font-family:'DM Sans',sans-serif;}

    .header{padding:32px 24px 24px;display:flex;align-items:center;gap:14px;}
    .hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;}
    .hamburger span{display:block;width:24px;height:2.5px;background:var(--teal-dark);border-radius:4px;}

    .avatar-section{padding:0 24px 32px;display:flex;align-items:center;gap:14px;}
    .avatar{width:56px;height:56px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,188,176,0.35);}
    .avatar svg{width:28px;height:28px;color:white;}
    .avatar-info h3{font-size:1rem;font-weight:600;color:var(--text);}
    .avatar-info p{font-size:0.8rem;color:var(--muted);}

    .menu-list{padding:0 16px;}
    .menu-item{display:flex;align-items:center;gap:14px;padding:16px 14px;border-radius:14px;text-decoration:none;color:var(--text);font-size:0.95rem;font-weight:500;transition:background 0.2s;margin-bottom:4px;animation:fadeUp 0.4s ease both;}
    .menu-item:nth-child(1){animation-delay:0.05s}
    .menu-item:nth-child(2){animation-delay:0.10s}
    .menu-item:nth-child(3){animation-delay:0.15s}
    .menu-item:nth-child(4){animation-delay:0.20s}
    .menu-item:nth-child(5){animation-delay:0.25s}
    .menu-item:hover{background:rgba(26,188,176,0.15);}
    .menu-item svg{width:22px;height:22px;color:var(--teal-dark);flex-shrink:0;}
    .menu-item.logout{color:#e05c5c;margin-top:24px;}
    .menu-item.logout svg{color:#e05c5c;}

    .divider{height:1px;background:var(--border);margin:8px 16px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="header">
    <a href="/dashboard" style="text-decoration:none;">
      <div class="hamburger"><span></span><span></span><span></span></div>
    </a>
  </div>

  <div class="avatar-section">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="avatar-info">
      <h3>{{ user }}</h3>
      <p>HealthCare Member</p>
    </div>
  </div>

  <div class="menu-list">
    <a href="/profile" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      My Profile
    </a>
    <a href="/settings" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </a>

    <div class="divider"></div>

    <a href="/instructions" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      Instructions
    </a>
    <a href="/feedback" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Feedback
    </a>
    <a href="/privacy" class="menu-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Privacy Policy
    </a>

    <div class="divider"></div>

    <a href="/logout" class="menu-item logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log Out
    </a>
  </div>
</body>
</html>
