<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cycle Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      padding: 30px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .cycle-input {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 25px;
    }

    input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #6c63ff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #574fd6;
    }

    .info-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-radius: 10px;
      background: #f1f3ff;
      margin-bottom: 10px;
    }

    .info-text h3 {
      margin: 0;
      font-size: 16px;
    }

    .info-text p {
      margin: 4px 0 0;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Cycle Tracker</h2>

  <!-- User Inputs -->
  <div class="cycle-input">
    <label>Last Period Start:</label>
    <input type="date" id="lastPeriodDate">

    <label>Cycle Length (days):</label>
    <input type="number" id="cycleLength" value="28" min="21" max="40">

    <button onclick="updateCycle()">Update</button>
  </div>

  <!-- Cycle Day Card -->
  <div class="info-card">
    <div class="info-text">
      <h3>Cycle Day</h3>
      <p id="cycleDayText">Not calculated yet</p>
    </div>
  </div>

  <!-- Next Period Card -->
  <div class="info-card">
    <div class="info-text">
      <h3>Next Period</h3>
      <p id="nextPeriodText">Not calculated yet</p>
    </div>
  </div>

</div>

<script>
function updateCycle() {
  const lastPeriod = document.getElementById("lastPeriodDate").value;
  const cycleLength = parseInt(document.getElementById("cycleLength").value);

  if (!lastPeriod || !cycleLength) {
    alert("Please enter your last period date and cycle length");
    return;
  }

  const startDate = new Date(lastPeriod);
  const today = new Date();

  today.setHours(0,0,0,0);
  startDate.setHours(0,0,0,0);

  const diffTime = today - startDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const cycleDay = (diffDays % cycleLength) + 1;


  const nextPeriodDate = new Date(startDate);
  nextPeriodDate.setDate(startDate.getDate() + cycleLength);

  const daysRemaining = Math.ceil(
    (nextPeriodDate - today) / (1000 * 60 * 60 * 24)
  );

  // Format dates
  const options = { month: 'short', day: 'numeric' };
  const formattedStart = startDate.toLocaleDateString(undefined, options);
  const formattedNext = nextPeriodDate.toLocaleDateString(undefined, options);

  // Update UI
  document.getElementById("cycleDayText").innerText =
    `Day ${cycleDay} of ${cycleLength} · Started ${formattedStart}`;

  document.getElementById("nextPeriodText").innerText =
    `Expected in ${daysRemaining} days · ${formattedNext}`;
}
</script>

</body>
</html>
